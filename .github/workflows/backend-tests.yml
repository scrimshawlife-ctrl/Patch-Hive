name: Backend Tests

on:
  push:
    branches: [main, develop, 'codex/**']
    paths: ['backend/**', '.github/workflows/backend-tests.yml']
  pull_request:
    branches: [main, develop]
    paths: ['backend/**', '.github/workflows/backend-tests.yml']

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    services:
      postgres:
        image: postgres:15.13
        env:
          POSTGRES_USER: patchhive
          POSTGRES_PASSWORD: patchhive_test
          POSTGRES_DB: patchhive_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install pinned backend dependencies
        working-directory: backend
        run: python -m pip install -e '.[dev]'
      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://patchhive:patchhive_test@localhost:5432/patchhive_test
        run: python -m alembic upgrade head
      - name: Run backend suite
        working-directory: backend
        env:
          DATABASE_URL: postgresql://patchhive:patchhive_test@localhost:5432/patchhive_test
          PYTHONPATH: .
        run: python -m pytest -q --cov=. --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
