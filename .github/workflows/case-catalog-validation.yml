name: Case Catalog Validation

on:
  pull_request:
    paths:
      - "backend/cases/**"
      - "backend/integrations/case_catalog_populator.py"
      - "backend/tests/test_case_catalog_populator.py"
      - "backend/alembic/versions/20260721_modular_case_catalog.py"
      - "backend/alembic/versions/20260721_case_source_policy.py"
      - "data/cases/**"
      - ".github/workflows/case-catalog-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: sqlite:///./case_catalog_test.db
      TEST_MODE: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Run focused importer tests
        run: pytest -q tests/test_case_catalog_populator.py
      - name: Initialize isolated case schema
        run: |
          python - <<'PY'
          from cases import CaseSourcePolicyPacket  # noqa: F401
          from cases.models import CaseCatalog  # noqa: F401
          from core.database import Base, engine

          Base.metadata.create_all(bind=engine)
          PY
      - name: Validate seed example dry run
        run: python -m integrations.case_catalog_populator --input ../data/cases/schema.example.json --dry-run --receipt ../out/case_catalog/example-dry-run-receipt.json
      - name: Upload focused validation receipt
        uses: actions/upload-artifact@v4
        with:
          name: case-catalog-focused-validation
          path: out/case_catalog/example-dry-run-receipt.json
          if-no-files-found: error

  migration-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: patchhive
          POSTGRES_PASSWORD: patchhive
          POSTGRES_DB: patchhive_case_catalog_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U patchhive -d patchhive_case_catalog_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://patchhive:patchhive@localhost:5432/patchhive_case_catalog_ci
      TEST_MODE: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Upgrade through case source policy head
        run: alembic upgrade 20260721_case_source_policy
      - name: Downgrade to prior head
        run: alembic downgrade 20260721_user_style_recipes
      - name: Re-upgrade through case source policy head
        run: alembic upgrade 20260721_case_source_policy
      - name: Verify expected tables
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, inspect
          from core.config import settings

          expected = {
              "case_catalog",
              "case_revisions",
              "case_rows",
              "case_power_systems",
              "case_features",
              "case_prices",
              "case_sources",
              "case_source_policy_packets",
          }
          tables = set(inspect(create_engine(settings.database_url)).get_table_names())
          missing = sorted(expected - tables)
          if missing:
              raise SystemExit(f"missing expected tables: {missing}")
          print({"status": "pass", "tables": sorted(expected)})
          PY
