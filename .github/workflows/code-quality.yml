name: Code Quality

on:
  push:
    branches: [main, develop, 'codex/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - working-directory: backend
        run: python -m pip install -e '.[dev]'
      - name: Canonical domain lint
        working-directory: backend
        run: python -m ruff check canon evidence core/security.py tests/unit/test_canon_*.py tests/unit/test_image_evidence.py
      - name: Canonical domain typecheck
        working-directory: backend
        run: python -m mypy canon/contracts.py canon/compiler.py canon/runes.py canon/downloads.py evidence/images.py
      - name: Formatting gate
        working-directory: backend
        run: python -m black --check canon evidence core/security.py tests/unit/test_canon_*.py tests/unit/test_image_evidence.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm run type-check
      - working-directory: frontend
        run: npm test -- --run
      - working-directory: frontend
        run: npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Canonical workflow browser tests
        working-directory: frontend
        run: npm run test:e2e
