name: Security and Supply Chain

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'codex/**']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Python dependency and static audit
        working-directory: backend
        run: |
          python -m pip install -e '.[dev]'
          python -m pip_audit
          python -m bandit -q -ll -r . -x ./tests,./patchhive/tests,./patchhive/runes/tests
      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high
      - name: Generate SBOMs
        run: |
          mkdir -p security-artifacts
          cd backend && cyclonedx-py environment --output-reproducible --output-file ../security-artifacts/python.cdx.json
          cd ../frontend && npm sbom --sbom-format cyclonedx > ../security-artifacts/npm.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: patchhive-sboms
          path: security-artifacts/*.json
